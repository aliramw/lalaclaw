        function normalizeLocale(rawLocale) {
          var normalized = String(rawLocale || "").toLowerCase();
          if (normalized.indexOf("zh") === 0) return "zh";
          if (normalized.indexOf("ja") === 0) return "ja";
          if (normalized.indexOf("fr") === 0) return "fr";
          if (normalized.indexOf("en") === 0) return "en";
          return null;
        }

        function getMessage(copy, key) {
          return Object.prototype.hasOwnProperty.call(copy, key) ? copy[key] : null;
        }

        var locale = null;

        try {
          locale = normalizeLocale(window.localStorage.getItem(storageKey));
        } catch {}

        if (!locale) {
          var candidates = Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language];
          locale = candidates.map(normalizeLocale).find(Boolean) || "zh";
        }

        var copy = messages[locale] || messages.zh;
        var intlLocale = langMap[locale] || "zh-CN";

        window.__commandCenterLocale = {
          locale: locale,
          intlLocale: intlLocale,
          messages: copy
        };

        document.documentElement.lang = intlLocale;
        document.title = getMessage(copy, "doc.title") || "OpenClaw Command Center";

        function applyLocalizedContent() {
          document.querySelectorAll("[data-i18n-text]").forEach(function (node) {
            var key = node.getAttribute("data-i18n-text");
            var value = getMessage(copy, key);
            if (value !== null) {
              node.textContent = value;
            }
          });

          document.querySelectorAll("[data-i18n-placeholder]").forEach(function (node) {
            var key = node.getAttribute("data-i18n-placeholder");
            var value = getMessage(copy, key);
            if (value !== null) {
              node.setAttribute("placeholder", value);
            }
          });

          document.querySelectorAll("[data-i18n-title]").forEach(function (node) {
            var key = node.getAttribute("data-i18n-title");
            var value = getMessage(copy, key);
            if (value !== null) {
              node.setAttribute("title", value);
            }
          });

          document.querySelectorAll("[data-i18n-aria-label]").forEach(function (node) {
            var key = node.getAttribute("data-i18n-aria-label");
            var value = getMessage(copy, key);
            if (value !== null) {
              node.setAttribute("aria-label", value);
            }
          });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", applyLocalizedContent, { once: true });
        } else {
          applyLocalizedContent();
        }
      })();

  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-title">
          <p class="eyebrow">OpenClaw</p>
          <h1 data-i18n-text="topbar.heading">指挥中心</h1>
        </div>
        <section class="topbar-status">
          <div class="inline-status inline-status-selectable">
            <span class="status-label" data-i18n-text="status.model">模型</span>
            <button id="model-menu-button" class="status-menu-trigger" type="button" data-i18n-aria-label="status.modelAria" aria-label="选择模型" aria-expanded="false">▾</button>
            <div id="model-menu" class="status-menu" hidden></div>
            <strong id="model-badge" data-i18n-text="status.unknown">未知</strong>
            <small id="model-meta" class="status-meta" data-i18n-text="status.disconnected">未连接</small>
          </div>
          <div class="inline-status inline-status-selectable">
            <span class="status-label" data-i18n-text="status.agent">Agent</span>
            <button id="agent-menu-button" class="status-menu-trigger" type="button" data-i18n-aria-label="status.agentAria" aria-label="选择 Agent" aria-expanded="false">▾</button>
            <div id="agent-menu" class="status-menu" hidden></div>
            <strong id="agent-badge">main</strong>
            <small id="session-badge" class="status-meta" data-i18n-text="status.waitingSession">等待会话</small>
          </div>
          <div class="inline-status">
            <span class="status-label" data-i18n-text="status.runtime">运行状态</span>
            <strong id="status-badge" data-i18n-text="status.idle">空闲</strong>
            <small id="runtime-badge" class="status-meta">mock</small>
          </div>
          <div class="inline-status">
            <span class="status-label" data-i18n-text="status.fastMode">快速模式</span>
            <label class="status-toggle">
              <input id="fast-mode" type="checkbox" />
              <span id="fast-badge" data-i18n-text="status.off">关闭</span>
            </label>
            <small id="mode-badge" class="status-meta" data-i18n-text="status.mock">模拟</small>
          </div>
          <div class="inline-status">
            <span class="status-label" data-i18n-text="status.context">上下文</span>
            <strong><span id="context-length">0</span> / <span id="context-max">16000</span></strong>
            <small id="context-meta" class="status-meta" data-i18n-text="status.waitingState">等待状态</small>
          </div>
          <div class="inline-status">
            <span class="status-label" data-i18n-text="status.queue">队列</span>
            <strong id="queue-badge" data-i18n-text="status.none">无</strong>
            <small id="updated-badge" class="status-meta" data-i18n-text="status.noUpdates">暂无更新</small>
          </div>
        </section>
        <div class="topbar-controls">
          <button id="reset-button" class="ghost compact-button" data-i18n-text="controls.reset" data-i18n-title="controls.resetTitle" title="重置对话 (⌘N)">重置对话</button>
        </div>
      </header>

      <main class="layout">
        <section class="chat-panel panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow" data-i18n-text="chat.eyebrow">对话</p>
              <h2 data-i18n-text="chat.heading">会话窗口</h2>
            </div>
          </div>

          <div id="message-list" class="message-list"></div>

          <div class="composer">
            <label class="field">
              <span data-i18n-text="chat.inputLabel">输入指令</span>
              <textarea id="prompt-input" rows="4" data-i18n-placeholder="chat.placeholder" placeholder="描述你希望 Agent 在当前 workspace 中完成什么。"></textarea>
            </label>
            <div class="composer-actions">
              <span id="request-hint" data-i18n-text="chat.hint">Shift + 回车发送，回车换行</span>
              <button id="send-button" data-i18n-text="chat.send">发送</button>
            </div>
          </div>
        </section>

        <section class="right-rail panel">
          <div class="tabbar" id="side-tabs">
            <button type="button" class="tab-button is-active" data-tab="timeline" data-i18n-text="tabs.timeline">执行</button>
            <button type="button" class="tab-button" data-tab="files" data-i18n-text="tabs.files">文件</button>
            <button type="button" class="tab-button" data-tab="artifacts" data-i18n-text="tabs.artifacts">产出</button>
            <button type="button" class="tab-button" data-tab="snapshots" data-i18n-text="tabs.snapshots">快照</button>
            <button type="button" class="tab-button" data-tab="agents" data-i18n-text="tabs.agents">协作</button>
            <button type="button" class="tab-button" data-tab="peek" data-i18n-text="tabs.peek">预览</button>
          </div>

          <div class="tab-panels">
            <article class="tab-panel is-active" data-tab-panel="timeline">
              <div class="panel-head">
                <div>
                  <p class="eyebrow" data-i18n-text="panel.timelineEyebrow">追踪</p>
                  <h2 data-i18n-text="panel.timelineHeading">执行时间线</h2>
                </div>
              </div>
              <div id="tool-list" class="list"></div>
            </article>

            <article class="tab-panel" data-tab-panel="files">
              <div class="panel-head">
                <div>
                  <p class="eyebrow" data-i18n-text="panel.filesEyebrow">文件</p>
                  <h2 data-i18n-text="panel.filesHeading">引入文件</h2>
                </div>
              </div>
              <div id="file-list" class="list"></div>
            </article>

            <article class="tab-panel" data-tab-panel="artifacts">
              <div class="panel-head">
                <div>
                  <p class="eyebrow" data-i18n-text="panel.artifactsEyebrow">产出</p>
                  <h2 data-i18n-text="panel.artifactsHeading">产出物</h2>
                </div>
              </div>
              <div id="artifact-list" class="list"></div>
            </article>

            <article class="tab-panel" data-tab-panel="snapshots">
              <div class="panel-head">
                <div>
                  <p class="eyebrow" data-i18n-text="panel.snapshotsEyebrow">恢复</p>
                  <h2 data-i18n-text="panel.snapshotsHeading">快照</h2>
                </div>
              </div>
              <div id="snapshot-list" class="list"></div>
            </article>

            <article class="tab-panel" data-tab-panel="agents">
              <div class="panel-head">
                <div>
                  <p class="eyebrow" data-i18n-text="panel.agentsEyebrow">协作</p>
                  <h2 data-i18n-text="panel.agentsHeading">Agent 结构</h2>
                </div>
              </div>
              <div id="agent-graph" class="agent-graph"></div>
            </article>

            <article class="tab-panel" data-tab-panel="peek">
              <div class="panel-head">
                <div>
                  <p class="eyebrow" data-i18n-text="panel.peekEyebrow">预览</p>
                  <h2 data-i18n-text="panel.peekHeading">工作区 / 终端 / 浏览器</h2>
                </div>
              </div>
              <div class="peek-grid">
                <div class="list-item">
                  <span class="peek-label" data-i18n-text="peek.workspace">工作区</span>
                  <p id="workspace-peek" data-i18n-text="peek.waiting">等待加载…</p>
                </div>
                <div class="list-item">
                  <span class="peek-label" data-i18n-text="peek.terminal">终端</span>
                  <p id="terminal-peek" data-i18n-text="peek.waiting">等待加载…</p>
                </div>
                <div class="list-item">
                  <span class="peek-label" data-i18n-text="peek.browser">浏览器</span>
                  <p id="browser-peek" data-i18n-text="peek.waiting">等待加载…</p>
                </div>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <template id="message-template">
      <article class="message">
        <header>
          <span class="message-role"></span>
          <time class="message-time"></time>
        </header>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
  </html>
